name: Build

# Checks the Dart code and compiles the app (debug APK + release per-ABI APKs
# + release AAB) on every push / PR. android/ and ios/ are committed directly
# (not regenerated in CI) because they carry custom native-build config for
# the room-mode solver (native/) -- see native/README.md and
# android/app/build.gradle.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  native-test:
    # Validates the C++ solver core (native/) on its own: no Flutter/mobile
    # toolchain needed, so this is a fast, cheap correctness gate that runs
    # independently of the Flutter build below.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S native -B native/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build native/build -j

      - name: Test
        run: ctest --test-dir native/build --output-on-failure

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # The Android build compiles native/ (the room-mode solver) via CMake,
      # which needs the specific NDK version android/app/build.gradle asks for
      # (flutter.ndkVersion) actually installed, not just the base Android SDK.
      # Using this action (rather than invoking `sdkmanager` directly) because
      # its location/PATH isn't guaranteed the same way across runner images.
      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;26.1.10909125"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      # Debug APK: large (~70 MB) — bundles the JIT VM and every ABI. Handy for
      # quick install/testing, NOT representative of real install size.
      - name: Build debug APK
        run: flutter build apk --debug

      # Release APKs, one per CPU architecture (AOT-compiled, R8-shrunk). Each is
      # only ~8–12 MB — what a device actually installs. (Signed with the debug
      # key until a real release keystore is configured.)
      - name: Build release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      # Release App Bundle for Play Store distribution (Google serves a
      # per-device APK from it).
      - name: Build release App Bundle
        run: flutter build appbundle --release

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - name: Upload release APKs (per ABI)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      - name: Upload release App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
