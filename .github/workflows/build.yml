name: Build

# Checks the Dart code and compiles the app (release per-ABI APKs) on every
# push. android/ and ios/ are committed directly (not regenerated in CI)
# because they carry custom native-build config for the room-mode solver
# (native/) -- see native/README.md and android/app/build.gradle.
#
# Only `push` triggers this, not `pull_request` -- `push: branches: ["**"]`
# already covers every commit on every branch, including a PR's source
# branch, so also triggering on `pull_request` ran everything twice per
# commit for no extra signal.
#
# Only the release APK is built (not a debug APK or an AAB): release mode
# (AOT + R8) is a stronger signal than debug (which skips both), so it
# subsumes what a debug build would additionally catch; and the AAB needs
# the same per-ABI native compile as the split APKs, so building both is
# redundant work for a CI gate whose job is "does this still assemble",
# not "produce every distributable artifact". Build an AAB on demand
# (`flutter build appbundle --release`) when actually cutting a release.

on:
  push:
    branches: ["**"]

jobs:
  native-test:
    # Validates the C++ solver core (native/) on its own: no Flutter/mobile
    # toolchain needed, so this is a fast, cheap correctness gate that runs
    # independently of the Flutter build below.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S native -B native/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build native/build -j

      - name: Test
        run: ctest --test-dir native/build --output-on-failure

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # The Android build compiles native/ (the room-mode solver) via CMake,
      # which needs the specific NDK version android/app/build.gradle.kts asks
      # for (flutter.ndkVersion) actually installed, not just the base Android
      # SDK. Using this action (rather than invoking `sdkmanager` directly)
      # because its location/PATH isn't guaranteed the same way across runner
      # images. The version must match FlutterExtension.kt's default ndkVersion
      # for the Flutter version in use (subosito/flutter-action's `channel:
      # stable` below) -- check
      # packages/flutter_tools/gradle/src/main/kotlin/FlutterExtension.kt in
      # the Flutter SDK if this build ever fails with an NDK version mismatch.
      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;28.2.13676358"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      # Release APKs, one per CPU architecture (AOT-compiled, R8-shrunk). Each is
      # only ~8–12 MB — what a device actually installs. (Signed with the debug
      # key until a real release keystore is configured.)
      - name: Build release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload release APKs (per ABI)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      # ── Diagnostic variants for the release-only startup crash ──
      # Each split isolates one axis; install each (after a full uninstall)
      # and note which launch:
      #   no-ads      → Dart ads-init path compiled out
      #   no-minify   → release AOT but R8/resource-shrinking off
      #   debug       → no R8, JIT — if only this works, it's shrinker+AOT
      - name: Build no-ads diagnostic APKs (split per ABI)
        run: flutter build apk --release --split-per-abi --dart-define=ADS_DISABLED=true

      - name: Upload no-ads diagnostic APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apks-no-ads
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      - name: Build no-minify diagnostic APKs (split per ABI)
        env:
          NO_MINIFY: "true"
        run: flutter build apk --release --split-per-abi

      - name: Upload no-minify diagnostic APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apks-no-minify
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      - name: Build debug diagnostic APK
        run: flutter build apk --debug

      - name: Upload debug diagnostic APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
