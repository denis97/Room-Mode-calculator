name: Build

# Regenerates the platform folders, checks the Dart code, and compiles a debug
# APK on every push / PR. Because android/ and ios/ are kept out of the repo,
# the `flutter create .` step recreates them from pubspec.yaml before building.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Regenerate platform folders
        # Only (re)generate the android/ ios/ platform code — not lib/ or test/.
        # `flutter create` would otherwise recreate the default test/widget_test.dart
        # (which references a `MyApp` this project doesn't define) and break analyze.
        run: |
          flutter create --platforms=android,ios .
          rm -f test/widget_test.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
