name: room_mode_calculator
description: "Calculate the acoustic room modes of a rectangular room."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management for the room inputs and derived mode list.
  flutter_riverpod: ^2.4.0

  # Plays the generated sine tones when a mode/key is tapped.
  audioplayers: ^6.1.0

  # Memory allocation helpers (calloc/malloc) for the native solver's FFI
  # bindings (lib/core/numeric/native/).
  ffi: ^2.1.0
  google_mobile_ads: ^9.0.0
  in_app_purchase: ^3.1.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# Launcher icon generation (`dart run flutter_launcher_icons`): the master
# art in assets/icon/ is produced by a small script (see the repo history /
# release notes) and rendered here into every Android mipmap density plus
# the adaptive-icon layers.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#0A0B0E"
  adaptive_icon_foreground: assets/icon/icon_foreground.png
  min_sdk_android: 24

flutter:
  uses-material-design: true

  fonts:
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
          weight: 300
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
          weight: 700
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
          weight: 600
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
          weight: 700
